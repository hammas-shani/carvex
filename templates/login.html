{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-5 col-sm-9">

    <!-- Brand -->
    <div class="text-center mb-4 pt-2">
      <div class="auth-logo-wrap">
        <i class="bi bi-car-front-fill"></i>
      </div>
      <h1 class="auth-brand-name">CarVex</h1>
      <p class="auth-brand-sub">Pakistan's Premium Car Marketplace</p>
    </div>

    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs mb-4">
        <button class="auth-tab active" id="login-tab"
                data-pane="loginPane" type="button">
          <i class="bi bi-box-arrow-in-right me-1"></i>Login
        </button>
        <button class="auth-tab" id="signup-tab"
                data-pane="signupPane" type="button">
          <i class="bi bi-person-plus me-1"></i>Sign Up
        </button>
      </div>

      <div id="loginPane" class="auth-pane">
        <form method="POST">
          <input type="hidden" name="action" value="login">
          <div class="field-group mb-3">
            <label class="field-label">Email address</label>
            <div class="input-icon-wrap">
              <i class="bi bi-envelope field-icon"></i>
              <input type="email" name="email" class="field-input icon-pad"
                     placeholder="you@example.com" required>
            </div>
          </div>
          <div class="field-group mb-4">
            <label class="field-label">Password</label>
            <div class="input-icon-wrap">
              <i class="bi bi-lock field-icon"></i>
              <input type="password" name="password" class="field-input icon-pad"
                     placeholder="••••••••" required>
            </div>
          </div>
          <button type="submit" class="submit-btn w-100">Login to CarVex</button>
        </form>
      </div>

      <div id="signupPane" class="auth-pane d-none">
        <form method="POST">
          <input type="hidden" name="action" value="signup">
          <div class="field-group mb-3">
            <label class="field-label">Email address</label>
            <div class="input-icon-wrap">
              <i class="bi bi-envelope field-icon"></i>
              <input type="email" name="email" class="field-input icon-pad"
                     placeholder="you@example.com" required>
            </div>
          </div>
          <div class="field-group mb-3">
            <label class="field-label">Phone Number</label>
            <div class="input-icon-wrap">
              <i class="bi bi-phone field-icon"></i>
              <input type="tel" name="phone" class="field-input icon-pad"
                     placeholder="+92 300 1234567" required>
            </div>
          </div>
          <div class="field-group mb-4">
            <label class="field-label">Password</label>
            <div class="input-icon-wrap">
              <i class="bi bi-lock field-icon"></i>
              <input type="password" name="password" class="field-input icon-pad"
                     placeholder="At least 6 characters" minlength="6" required>
            </div>
          </div>
          <button type="submit" class="submit-btn w-100">
            <i class="bi bi-person-check-fill me-1"></i>Create Account
          </button>
        </form>
      </div>

    </div>

    <p class="text-center mt-3" style="color:var(--muted);font-size:.8rem;">
      By signing up you agree to our terms &amp; privacy policy.
    </p>
  </div>
</div>

{% endblock %}
{% block scripts %}
<style>
  .auth-logo-wrap {
    width:64px;height:64px;border-radius:18px;
    background:var(--accent-light);border:1.5px solid var(--accent-mid);
    display:inline-flex;align-items:center;justify-content:center;
    font-size:1.9rem;color:var(--accent);margin-bottom:.6rem;
  }
  .auth-brand-name { font-size:1.6rem;font-weight:900;color:var(--text);margin:0; }
  .auth-brand-sub  { color:var(--muted);font-size:.84rem;margin:0; }

  .auth-card {
    background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:2rem;
    box-shadow:0 4px 24px rgba(0,0,0,.07);
  }

  /* Tabs */
  .auth-tabs { display:flex;background:var(--surface2);border-radius:12px;padding:4px;gap:4px;border:1px solid var(--border); }
  .auth-tab {
    flex:1;border:none;border-radius:9px;padding:.5rem;
    font-size:.88rem;font-weight:600;color:var(--muted);
    background:transparent;cursor:pointer;transition:background .2s,color .2s,box-shadow .2s;
  }
  .auth-tab.active {
    background:var(--surface);color:var(--accent);
    box-shadow:0 1px 6px rgba(0,0,0,.1);
  }

  /* Fields */
  .field-label { display:block;font-size:.83rem;font-weight:600;color:var(--text2);margin-bottom:.45rem; }
  .input-icon-wrap { position:relative; }
  .field-icon { position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none; }
  .field-input {
    width:100%;background:var(--surface2);border:1.5px solid var(--border);
    border-radius:10px;color:var(--text);padding:.65rem .9rem;font-size:.92rem;
    outline:none;transition:border-color .2s,box-shadow .2s;
  }
  .field-input:focus { border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,166,35,.2);background:#fff; }
  .field-input::placeholder { color:var(--muted); }
  .icon-pad { padding-left:2.4rem; }

  .submit-btn {
    background:var(--accent);color:#fff;font-weight:700;border:none;
    border-radius:10px;padding:.75rem;font-size:.95rem;cursor:pointer;
    transition:background .2s,transform .15s,box-shadow .2s;
  }
  .submit-btn:hover {
    background:var(--accent-dark);transform:translateY(-1px);
    box-shadow:0 4px 14px rgba(245,166,35,.35);
  }
</style>
<script>
  document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-pane').forEach(p => p.classList.add('d-none'));
      this.classList.add('active');
      document.getElementById(this.dataset.pane).classList.remove('d-none');
    });
  });
</script>
{% endblock %}
